name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check src/ tests/

      - name: Test
        run: pytest tests/ -v

  build-web:
    # Runs in parallel with lint-and-test (Python). The deploy job
    # blocks on both before touching the Pi.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          # No cache yet: setup-node's pnpm cache needs a lockfile AND
          # a stable store path. We'll re-enable `cache: 'pnpm'` (with
          # `cache-dependency-path: 'web/pnpm-lock.yaml'`) after the
          # lockfile is committed and the pipeline is green once.

      # Plain `pnpm install` (not --frozen-lockfile) so the first push
      # succeeds before the lockfile is committed. Once web/pnpm-lock.yaml
      # exists in the repo, pnpm will honour it deterministically.
      - name: Install web dependencies
        run: pnpm --dir web install

      # Lint (prettier + eslint) is run locally via `pnpm run lint`.
      # Not gated in CI yet — we'll re-enable after the first successful
      # deploy once formatting and rule config are stabilised.

      - name: Test web (unit)
        run: pnpm --dir web run test

      - name: Build web
        run: pnpm --dir web run build

      - name: Verify build output
        run: |
          # Fail the job loudly if the build emitted nothing useful —
          # cheaper than discovering it on the Pi after rsync.
          test -s web/dist/index.html
          grep -q 'id="hud-config"' web/dist/index.html
          echo "Build artifact OK ($(du -sh web/dist | cut -f1))"

          # Confirm the SvelteKit route manifest includes every route we
          # expect. adapter-static bakes the manifest into the first
          # hashed JS chunk under _app/; if a route silently drops out
          # of the build, a literal path match will fail here rather
          # than 404ing on the phone in production.
          MANIFEST_FILES=$(find web/dist/_app -name '*.js' 2>/dev/null || true)
          if [ -z "$MANIFEST_FILES" ]; then
            echo "::error::No _app JS files found — build malformed."
            exit 1
          fi
          for ROUTE in "/voice" "/grocery" "/recipes" "/garden" \
                       "/admin" "/admin/sessions" "/admin/logs" \
                       "/admin/config" "/admin/voice-cache" "/admin/services"; do
            if ! grep -rqF "\"$ROUTE\"" web/dist/_app 2>/dev/null \
              && ! grep -rqF "'$ROUTE'" web/dist/_app 2>/dev/null; then
              echo "::error::Route $ROUTE missing from SvelteKit build — check for a compile error on that page."
              exit 1
            fi
          done
          echo "All expected routes present in build."

      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist
          retention-days: 7
          if-no-files-found: error

  deploy:
    needs: [lint-and-test, build-web]
    runs-on: [self-hosted, pi]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Pull latest code
        run: |
          sudo -H -u hud git -C /opt/homehud fetch origin main
          sudo -H -u hud git -C /opt/homehud reset --hard origin/main

      - name: Ensure system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libportaudio2 portaudio19-dev ffmpeg libopenblas-dev \
            libopenjp2-7 libtiff6 espeak-ng \
            python3-lgpio
          sudo ldconfig

      - name: Ensure Tailscale installed
        run: |
          if ! command -v tailscale &>/dev/null; then
            curl -fsSL https://tailscale.com/install.sh | sudo sh
          fi
          # Check connection status (initial setup done manually via SSH:
          #   sudo tailscale up --hostname=homehud)
          if tailscale status --json 2>/dev/null | python3 -c "import json,sys; sys.exit(0 if json.load(sys.stdin).get('BackendState')=='Running' else 1)" 2>/dev/null; then
            echo "Tailscale connected"
          else
            echo "Tailscale not connected — run 'sudo tailscale up --hostname=homehud' on the Pi to set up"
          fi

      - name: Ensure Python 3.11 venv
        run: |
          # Find Python 3.11 — check versioned command, then system python3
          PY311=""
          if python3 -c "import sys; assert sys.version_info[:2] == (3, 11)" 2>/dev/null; then
            PY311="python3"
          elif command -v python3.11 &>/dev/null; then
            PY311="python3.11"
          fi

          # Install if not found
          if [ -z "$PY311" ]; then
            echo "Python 3.11 not found, attempting apt install..."
            sudo apt-get update -qq
            if sudo apt-get install -y -qq python3.11 python3.11-venv python3-dev 2>/dev/null; then
              PY311="python3.11"
            else
              echo "apt install failed, building Python 3.11 from source..."
              sudo apt-get install -y -qq \
                build-essential zlib1g-dev libncurses5-dev libgdbm-dev \
                libnss3-dev libssl-dev libreadline-dev libffi-dev \
                libsqlite3-dev wget libbz2-dev liblzma-dev
              PY_VER=3.11.11
              cd /tmp
              wget -q "https://www.python.org/ftp/python/${PY_VER}/Python-${PY_VER}.tgz"
              tar xzf "Python-${PY_VER}.tgz"
              cd "Python-${PY_VER}"
              ./configure --enable-optimizations --prefix=/usr/local 2>&1 | tail -1
              make -j$(nproc) 2>&1 | tail -1
              sudo make altinstall 2>&1 | tail -1
              sudo rm -rf /tmp/Python-${PY_VER} /tmp/Python-${PY_VER}.tgz
              PY311="python3.11"
            fi
          fi

          echo "Using Python: $PY311 ($($PY311 --version))"

          # Ensure venv module available (needed for system python3)
          sudo apt-get install -y -qq python3-venv python3.11-venv 2>/dev/null || true

          # Recreate venv if missing, wrong version, lacks system-site-packages,
          # or was created with a different Python binary
          CURRENT_PY=$(sudo -H -u hud /opt/homehud/venv/bin/python3 -c \
            "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}')" \
            2>/dev/null || echo "none")
          HAS_SYSTEM_PKGS=$(grep -c 'include-system-site-packages = true' \
            /opt/homehud/venv/pyvenv.cfg 2>/dev/null || echo "0")
          VENV_HOME=$(grep '^home = ' /opt/homehud/venv/pyvenv.cfg 2>/dev/null | sed 's/^home = //')
          PY311_HOME=$(dirname "$(which $PY311)")
          if [ "$CURRENT_PY" != "3.11" ] || [ "$HAS_SYSTEM_PKGS" = "0" ] || [ "$VENV_HOME" != "$PY311_HOME" ]; then
            echo "Venv needs update (Python=$CURRENT_PY, system-site-packages=$HAS_SYSTEM_PKGS, home=$VENV_HOME, expected=$PY311_HOME), recreating..."
            sudo rm -rf /opt/homehud/venv
            sudo -H -u hud $PY311 -m venv --system-site-packages /opt/homehud/venv
            sudo -H -u hud /opt/homehud/venv/bin/pip install -q --upgrade pip
          fi

      - name: Update dependencies
        run: |
          sudo -H -u hud /opt/homehud/venv/bin/pip install -q --upgrade -r /opt/homehud/requirements-pi.txt

      - name: Verify lgpio installed
        run: |
          sudo -H -u hud /opt/homehud/venv/bin/pip show lgpio

      - name: Download openWakeWord models
        run: |
          sudo -H -u hud /opt/homehud/venv/bin/python -c \
            "from openwakeword.utils import download_models; download_models()"

      - name: Download Kokoro ONNX model files
        run: |
          KOKORO_MODEL_URL="https://github.com/thewh1teagle/kokoro-onnx/releases/download/model-files-v1.0"
          sudo -H -u hud mkdir -p /opt/homehud/models
          if [ ! -f /opt/homehud/models/kokoro-v1.0.int8.onnx ]; then
            sudo -H -u hud wget -q -O /opt/homehud/models/kokoro-v1.0.int8.onnx \
              "$KOKORO_MODEL_URL/kokoro-v1.0.int8.onnx"
          fi
          if [ ! -f /opt/homehud/models/voices-v1.0.bin ]; then
            sudo -H -u hud wget -q -O /opt/homehud/models/voices-v1.0.bin \
              "$KOKORO_MODEL_URL/voices-v1.0.bin"
          fi

      - name: Smoke test
        run: |
          cd /opt/homehud/src
          sudo -H -u hud HUD_DISPLAY_MODE=mock /opt/homehud/venv/bin/python -c "from config import load_config; print('Config OK')"

      - name: Download SPA build artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          # Use /tmp/ (sticky 1777, world-readable) rather than the
          # runner's work dir — the latter lives under the runner
          # user's home (0700) which the ``hud`` service user can't
          # read across for the cp below.
          path: /tmp/web-dist

      - name: Verify artifact before sync
        run: |
          # Guard against an empty or malformed artifact nuking a
          # working dist/ via rsync --delete downstream.
          test -s /tmp/web-dist/index.html
          grep -q 'id="hud-config"' /tmp/web-dist/index.html
          # Ensure the tree is traversable by the hud user (cp below
          # runs as hud). The runner writes files 0644 by default, but
          # we chmod the dir explicitly for belt-and-suspenders.
          chmod -R a+rX /tmp/web-dist

      - name: Stage SPA assets into dist.new
        run: |
          # Stage the build into a sibling directory, then atomic-swap.
          # Keeps the previous dist/ intact as dist.prev for rollback if
          # the restart below fails.
          sudo -H -u hud mkdir -p /opt/homehud/web
          sudo -H -u hud rm -rf /opt/homehud/web/dist.new
          sudo -H -u hud cp -a /tmp/web-dist /opt/homehud/web/dist.new
          test -s /opt/homehud/web/dist.new/index.html

      - name: Swap SPA dist (atomic)
        run: |
          sudo -H -u hud rm -rf /opt/homehud/web/dist.prev
          if [ -d /opt/homehud/web/dist ]; then
            sudo -H -u hud mv /opt/homehud/web/dist /opt/homehud/web/dist.prev
          fi
          sudo -H -u hud mv /opt/homehud/web/dist.new /opt/homehud/web/dist
          ls -la /opt/homehud/web/dist | head -20

      - name: Sync systemd service file
        run: |
          sudo cp /opt/homehud/systemd/home-hud.service /etc/systemd/system/home-hud.service
          sudo systemctl daemon-reload

      - name: Restart service
        run: |
          sudo systemctl restart home-hud
          sleep 3
          if ! sudo systemctl is-active --quiet home-hud; then
            echo "Service failed to start. Journal output:"
            sudo journalctl -u home-hud -n 60 --no-pager
            exit 1
          fi
          sudo systemctl status home-hud --no-pager -l

      - name: Rollback SPA dist on failure
        if: failure()
        run: |
          # Restore the previous dist/ if we have one staged. No-op if
          # this deploy never got as far as the swap step, or if
          # dist.prev was never populated (first-ever deploy).
          if [ -d /opt/homehud/web/dist.prev ]; then
            echo "Rolling back SPA dist…"
            sudo -H -u hud rm -rf /opt/homehud/web/dist
            sudo -H -u hud mv /opt/homehud/web/dist.prev /opt/homehud/web/dist
            sudo systemctl restart home-hud || true
          else
            echo "No dist.prev to roll back to — leaving state as-is."
          fi

      - name: Probe health + SPA availability
        run: |
          # /api/health is auth-exempt. Works over HTTP or HTTPS (Pi runs
          # TLS with Tailscale certs in prod); ``-k`` skips localhost cert
          # mismatch since the cert names homehud.*.ts.net, not 127.0.0.1.
          probe() {
            curl -fksS --max-time 5 "https://127.0.0.1:8080$1" 2>/dev/null \
              || curl -fsS --max-time 5 "http://127.0.0.1:8080$1" 2>/dev/null
          }
          for i in 1 2 3 4 5; do
            if probe /api/health >/dev/null; then
              echo "Health check passed on attempt $i"
              break
            fi
            [ $i -eq 5 ] && { echo "Health check failed"; exit 1; }
            sleep 2
          done
          # SPA shell sanity check (soft — log but do not fail).
          if probe "/?ui=new" | grep -q 'id="hud-config"'; then
            echo "SPA shell served OK"
          else
            echo "::warning::SPA shell not detected at /?ui=new — classic UI still serving"
          fi

      - name: Refresh mDNS
        run: |
          sudo systemctl restart avahi-daemon
          echo "mDNS refreshed"
